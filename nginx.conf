# =============================================================================
# nginx.conf — Production Nginx config for Prompt BI
#
# Serves the React SPA, proxies /api and /socket.io to the backend,
# enables gzip compression, and sets long-lived cache headers for assets.
# =============================================================================

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # -------------------------------------------------------------------
    # Cache static assets (JS, CSS, images, fonts) for 1 year
    # Vite fingerprints filenames so cache-busting is built in.
    # -------------------------------------------------------------------
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------
    # Proxy /api requests to the FastAPI backend
    # -------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running AI query endpoints
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # -------------------------------------------------------------------
    # Proxy /socket.io to the backend with WebSocket upgrade support
    # -------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------------------------------------------------
    # SPA fallback — serve index.html for all unmatched routes so that
    # React Router can handle client-side navigation.
    # -------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
